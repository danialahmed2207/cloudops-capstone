# Nginx-Konfiguration fürs Frontend-Image.
# Übernimmt in Produktion, was im Dev-Modus der Vite-Proxy macht:
# statische Dateien ausliefern + /api ans Backend weiterreichen.

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # API-Requests ans Backend (Docker-Compose-Servicename "backend")
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA-Routing: unbekannte Pfade auf index.html zurückfallen lassen
    location / {
        try_files $uri /index.html;
    }
}
